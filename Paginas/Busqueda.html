<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busqueda</title>
    <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">
    <link rel="stylesheet" 
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="background-color: rgb(248, 252, 255); font-family: Arial, Helvetica, sans-serif;">


    <main style="background-color: white; width: 100%; height: 100px; 
    display: flex; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.1);">
        <img src="../Recursos/panelUsuario/iconousuario.png" width="80px" s
        tyle="margin-left: 30px;">
        <h1 style="font-size: 26px; margin-left: 40px;">
            Ventana de búsqueda
            </h1>
        <button style="width: 140px; height: 45px; background-color: white; 
        border: 2px solid gray; border-radius: 10px; margin-left: 750px;">
            <a href="panelUsuario.html" style="text-decoration: none; 
            color: rgb(60, 59, 59); font-weight: bold; font-size: 18px;">
                <i class="fa-solid fa-house"></i>
                Volver
            </a>
        </button>
    </main>


    <section style="background-color: white; width: 800px; height: 350px; 
    box-shadow: 0 4px 12px; border-radius: 15px; margin: 50px auto; 
    display: flex; flex-direction: column; align-items: center; justify-content: center;">
        
        <input type="text" id="busqueda" name="busqueda" required p
        placeholder="Busca por nombre o materia"
            style="width: 80%; height: 45px; border: 2px solid gray; 
            border-radius: 10px; font-size: 18px; padding-left: 15px; margin-bottom: 20px;">


        <img src="../Recursos/panelUsuario/lupa.png" width="100px">

        <p style="margin-top: 15px; color: gray; font-size: 14px; text-align: center;">
            Ingresa un nombre o materia para encontrar compañeros de estudio
        </p>
    </section>

</body>
</html>
