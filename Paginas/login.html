<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>
        <link rel="icon" type="image/x-icon" href="../Recursos/icono.ico">
    </head>

    <body style="background-color: rgb(238, 238, 238);">


        <section style="background-color: white; width: 380px;
        height: 620px; margin-left: auto; margin-right: auto;
        border-radius: 15px; margin-top: 20px; box-shadow: 0px 4px 4px;">

            <img src="../Recursos/login/circulito.jpg" width="90px" alt="Login"
            style="margin-left: 150px; margin-top: 40px;">

            <h1 style="font-family: Arial, Helvetica, sans-serif;
            text-align: center; margin-top: 20px; font-size: 24px;">
                SaberCompartido
            </h1>

            <h2 style="font-family: Arial, Helvetica, sans-serif;
            text-align: center; font-size: 16px; margin-top: 10px;
            font-weight: lighter; color: rgb(112, 111, 111);">
                Sistema de asesoramiento académico
            </h2>

            <form method="get" action="panelUsuario.html">



                <h3 style="font-family: Arial, Helvetica, sans-serif;
                margin-left: 30px; font-size: 16px; margin-top: 30px;
                margin-bottom: 7px;">
                    Correo Electrónico:
                </h3>

                <input type="email" id="correo" name ="correo" placeholder="usuario@ejemplo.com"
                required
                style="margin-left: 30px; width: 300px; height: 40px;border-radius: 10px;
                border: 2px solid gray; padding-left: 20px; font-size: 16px;">



                <h3 style="font-family: Arial, Helvetica, sans-serif;
                margin-left: 30px; font-size: 16px; margin-top: 20px;
                margin-bottom: 7px;">
                    Contraseña:
                </h3>
                <input type="password" id="contrasena" name="contrasena" placeholder="••••••••••"
                minlength="5" maxlength="10" required title="Debe incluir letras, números y al menos un carácter especial."
                pattern="(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*?&.#_-])[A-Za-z\d@$!%*?&.#_-]{5,10}"
                style="margin-left: 30px; width: 300px; height: 40px; border-radius: 10px;
                border: 2px solid gray; padding-left: 20px; font-size: 16px;"><br>



                <input type="checkbox" id="recordar" name="recordar" style="
                margin-top: 20px; margin-left: 40px; transform: scale(1.5)">
                <label style="font-family: Arial, Helvetica, sans-serif;
                font-weight: bold; font-size: 16px; margin-left: 6px;
                color: rgb(112, 111, 111);">
                    Recordarme
                </label>



                <button style="margin-left: 30px; margin-top: 20px;
                width: 330px; height: 50px; border-radius: 12px;
                border: 2px solid rgb(10, 10, 32); background-color: rgb(10, 10, 32);
                color: white; font-family: Arial, Helvetica, sans-serif;
                font-size: 18px; box-shadow: 0px 4px 10px;">
                    Iniciar sesión
                </button>

            </form>



            <div style="background-color: gray; width: 300px;
            height: 2px; margin-top: 30px; margin-left: 44px;
            margin-bottom: 20px;">  
            </div>



            <label style="font-family: Arial, Helvetica, sans-serif;
            font-weight: bold; font-size: 16px; margin-left: 60px;
            color: gray;">
                ¿No tiene una cuenta?
            </label>
            <a href="registro.html" style="text-decoration: none;
            font-family: Arial, Helvetica, sans-serif; font-weight: bold;
            font-size: 16px; color: rgb(10, 10, 32);">
                Regístrarse
            </a>
        </section>
    </body>
</html>
